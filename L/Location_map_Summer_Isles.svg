  <desc>
    A map of the Summer Isles from "A Song of Ice and Fire".
    This map covers the following coordinates (parentheses indicate repeating digits):
     - from 15.0°N to  1.897(72)°S
     - from  5.0°W to 12.0      °E
  </desc>
